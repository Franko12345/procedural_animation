name: build

# PyInstaller cannot cross-compile: a Windows .exe must be built ON Windows.
# This runs the same build.py on both OSes and uploads the binaries as artifacts.
# Push a tag like v1.0 to also attach them to a GitHub Release.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:        # lets you trigger it by hand from the Actions tab

permissions:
  contents: write        # required so the tag build can create/attach the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Lagarto-windows
            binary: dist/Lagarto.exe
          - os: ubuntu-latest
            artifact: Lagarto-linux
            binary: dist/Lagarto
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Headless self-test
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python lizard_game.py --smoke 120

      - name: Build executable
        run: python build.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary }}
